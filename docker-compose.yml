services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: massifx
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  web:
    build: .
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/massifx?schema=public
      NEXTAUTH_SECRET: local-docker-demo-secret-change-me
      NEXTAUTH_URL: http://localhost:3000
      ENABLE_LIVE_TRADING: "false"
    ports:
      - "3000:3000"

volumes:
  postgres-data:
